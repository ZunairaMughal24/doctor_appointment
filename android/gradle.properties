org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Build performance
org.gradle.parallel=true
org.gradle.caching=true

# Incremental Kotlin compilation. Requires the Pub cache and this project to be
# on the SAME drive (PUB_CACHE is set to F:\pub-cache), otherwise Kotlin's
# incremental compiler crashes on Windows computing cross-drive relative paths.
kotlin.incremental=true
